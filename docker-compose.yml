# ── EMA Docker Compose v2 ──────────────────────────────────────
# 工程管理智能体 - 一键部署
#
# 启动方式:
#   docker-compose up -d                    # 启动全部服务
#   docker-compose up -d api                # 只启动API
#   docker-compose down                     # 停止
#   docker-compose logs -f api              # 查看日志
#   docker-compose build --no-cache && docker-compose up -d  # 更新
#
# 访问地址:
#   API:     http://localhost:6188
#   UI:      http://localhost:6189  (开发模式，生产用nginx)
#   Swagger: http://localhost:6188/docs
#   Health:  http://localhost:6188/health
#
# 环境变量:
#   复制 .env.example 为 .env 并填入实际值
# ──────────────────────────────────────────────────────────────

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ema-api
    restart: unless-stopped
    ports:
      - "6188:6188"
    volumes:
      - ema-data:/app/data
      - ema-output:/app/output
    environment:
      - PYTHONPATH=/app/src
      - EMA_ENV=${EMA_ENV:-production}
      - EMA_PORT=${EMA_PORT:-6188}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - LONGCAT_API_KEY=${LONGCAT_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - WECHAT_APPID=${WECHAT_APPID:-}
      - WECHAT_SECRET=${WECHAT_SECRET:-}
      - WECHAT_MODE=${WECHAT_MODE:-mock}
      - SMTP_HOST=${SMTP_HOST:-smtp.qq.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - EMA_SSL_ENABLED=${EMA_SSL_ENABLED:-false}
      - EMA_SSL_CERT_PATH=${EMA_SSL_CERT_PATH:-./docker/certs/selfsigned.crt}
      - EMA_SSL_KEY_PATH=${EMA_SSL_KEY_PATH:-./docker/certs/selfsigned.key}
      - EMA_SERVER_NAME=${EMA_SERVER_NAME:-localhost}
    deploy:
      resources:
        limits:
          memory: ${EMA_MEMORY_LIMIT:-2G}
          cpus: "${EMA_CPU_LIMIT:-2.0}"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:6188/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ema-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx 反向代理（生产环境） ──
  nginx:
    image: nginx:alpine
    container_name: ema-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui:/usr/share/nginx/html:ro
      - ema-certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ema-net
    profiles:
      - prod   # 仅在生产模式启动: docker-compose --profile prod up -d

  # ── UI静态文件服务（开发模式） ──
  ui:
    image: python:3.12-slim
    container_name: ema-ui
    restart: unless-stopped
    ports:
      - "6189:6189"
    volumes:
      - ./ui:/app/ui:ro
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir aiohttp > /dev/null 2>&1 &&
             python3 -c '
import aiohttp.web, os
app = aiohttp.web.Application()
app.router.add_static(\"/\", \"/app/ui\", show_index=True)
aiohttp.web.run_app(app, host=\"0.0.0.0\", port=6189, print=lambda *a: None)
'"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ema-net
    profiles:
      - dev    # 开发模式: docker-compose --profile dev up -d

networks:
  ema-net:
    driver: bridge

volumes:
  ema-data:
    name: ema-data
  ema-output:
    name: ema-output
  ema-certs:
    name: ema-certs
