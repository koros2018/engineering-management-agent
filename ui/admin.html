<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMA 管家后台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b11;--card:#0f1923;--border:#182435;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e8edf5;--dim:#6b7a8d}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px}
.sb-name{font-size:14px;font-weight:600}.sb-role{font-size:10px;color:var(--accent)}
.sb-nav{flex:1;padding:12px 8px}.sb-item{padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:2px;transition:all .15s}
.sb-item:hover{background:var(--border);color:var(--text)}
.sb-item.active{background:var(--accent);color:#fff}
.main{flex:1;overflow-y:auto;padding:24px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h1{font-size:20px;font-weight:700;letter-spacing:.3px}
.topbar-badges{display:flex;gap:10px;align-items:center}
.badge{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600}
.badge.boss{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff}
.badge.live{background:var(--green);color:#000}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.card-value{font-size:28px;font-weight:700;color:var(--text)}
.card-change{font-size:11px;color:var(--green);margin-top:4px}
.card-change.down{color:var(--red)}
.health-ring{width:80px;height:80px;border-radius:50%;border:6px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto}
.health-ring.A{border-color:var(--green);color:var(--green)}
.health-ring.B{border-color:var(--accent);color:var(--accent)}
.health-ring.C{border-color:var(--yellow);color:var(--yellow)}
.alerts{grid-column:span 2}
.alert-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px;font-size:12px}
.alert-row:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.danger{background:var(--red)}.alert-dot.warning{background:var(--yellow)}.alert-dot.info{background:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--dim);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag.active{background:var(--green);color:#000}.tag.expired{background:var(--red);color:#fff}
.tag.free{background:var(--border);color:var(--dim)}.tag.pro{background:var(--accent);color:#fff}
.tag.ollama{background:#1a6b3a;color:#fff}.tag.nvidia{background:#76b900;color:#000}
.tag.enterprise{background:#7c3aed;color:#fff}.tag.private{background:#c2410c;color:#fff}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-weight:600;transition:opacity .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:10px}
.refresh{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(59,130,246,.5)}
.loading{text-align:center;padding:40px;color:var(--dim);font-size:13px}
.loading::after{content:'加载中...'}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim);font-size:13px;line-height:1.8}
.empty-state .icon{font-size:36px;margin-bottom:12px;display:block}
.refresh-btn{background:var(--border);color:var(--text);border:none;padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:8px}
.refresh-btn:hover{background:var(--accent);color:#fff}
/* Toast notification */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .3s;max-width:320px}
.toast.success{background:#22c55e;color:#000}
.toast.error{background:#ef4444;color:#fff}
.toast.info{background:var(--accent);color:#fff}
/* Model list spinner */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Advice cards */
.advice-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.advice-card.high{border-left:4px solid var(--red)}
.advice-card.medium{border-left:4px solid var(--yellow)}
.advice-title{font-weight:600;font-size:13px;margin-bottom:6px}
.advice-detail{font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:8px}
.advice-impact{font-size:11px;color:var(--green);font-weight:600}
/* Network cards */
.net-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.net-item:last-child{border-bottom:none}
.net-status{font-size:18px}
.net-ok{color:var(--green)}
.net-fail{color:var(--red)}
/* Tenant table */
.tenant-tr:hover td{background:rgba(59,130,246,.08)}
@media(max-width:768px){.sidebar{display:none}.grid{grid-template-columns:1fr}.main{padding:14px}}
</style>
</head>
<body>
<div id="app">
<div class="layout">
  <div class="sidebar">
    <div class="sb-header"><div class="sb-avatar">🎩</div><div><div class="sb-name">Boss</div><div class="sb-role">超级管理员</div></div></div>
    <div class="sb-nav">
      <div @click="tab='cockpit'" :class="['sb-item',{active:tab==='cockpit'}]">📊 驾驶舱</div>
      <div @click="tab='tenants'" :class="['sb-item',{active:tab==='tenants'}]">👥 租户管理</div>
      <div @click="tab='alerts'" :class="['sb-item',{active:tab==='alerts'}]">🚨 预警中心</div>
      <div @click="tab='reports'" :class="['sb-item',{active:tab==='reports'}]">📝 自动报告</div>
      <div @click="tab='advice'" :class="['sb-item',{active:tab==='advice'}]">💡 决策建议</div>
      <div @click="tab='logs'" :class="['sb-item',{active:tab==='logs'}]">📈 日志统计</div>
      <div @click="tab='models'" :class="['sb-item',{active:tab==='models'}]">🤖 模型配置</div>
    </div></div>
  <div class="main" v-if="!showAdminGate">
    <div class="topbar">
      <h1>{{pageTitle}}</h1>
      <div class="topbar-badges">
        <span class="badge boss">🎩 Boss Mode</span>
        <span class="badge live">● 在线</span>
        <span style="font-size:12px;color:var(--dim);cursor:pointer;margin-left:8px" @click="logout" title="登出">🚪 登出</span>
      </div>
    </div>

    <!-- 驾驶舱 -->
    <template v-if="tab==='cockpit'">
      <div class="grid">
        <div class="card">
          <div class="card-header"><span class="card-title">平台健康度</span></div>
          <div :class="['health-ring', cockpit.health_grade||'B']">{{ cockpit.health_score||0 }}%</div>
          <div style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">{{ gradeLabel }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">本月收入</span></div>
          <div class="card-value">¥{{ formatNum(cockpit.metrics?.revenue?.revenue_this_month||0) }}</div>
          <div class="card-change">📈 总收入 ¥{{ formatNum(cockpit.metrics?.revenue?.total_revenue||0) }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">租户总数</span></div>
          <div class="card-value">{{ cockpit.metrics?.projects?.tenants||0 }}</div>
          <div class="card-change">🟢 活跃 {{ cockpit.metrics?.revenue?.active_subscribers||0 }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">安全评分</span></div>
          <div class="card-value">{{ cockpit.metrics?.security?.score||85 }}</div>
          <div class="card-change">{{ cockpit.metrics?.security?.grade||'B' }} 级</div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">🚨 活跃预警 ({{ cockpit.alerts?.length||0 }})</span></div>
          <div v-if="cockpit.alerts?.length">
            <div v-for="a in cockpit.alerts?.slice(0,8)" :key="a.msg||''" class="alert-row">
              <div :class="['alert-dot', a.level||'info']"></div>
              <span style="flex:1;color:var(--text)">{{ a.msg }}</span>
            </div>
          </div>
          <div v-else style="color:var(--green);font-size:12px;padding:8px 0">✅ 平台运行正常，暂无预警</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">快速操作</span></div>
          <div v-for="a in [{id:'tenants',label:'👥 租户管理',desc:'查看所有租户及状态'},{id:'reports',label:'📝 生成报告',desc:'一键生成运营周报'},{id:'models',label:'🤖 模型配置',desc:'配置AI大模型'}]" :key="a.id"
            style="padding:9px 0;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);transition:color .15s"
            @click="tab=a.id;if(a.id==='tenants')loadTenants();if(a.id==='models')loadModels()">
            <div style="color:var(--text);font-weight:600">{{ a.label }}</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">{{ a.desc }}</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">套餐分布</span></div>
          <div v-for="(v,k) in (cockpit.metrics?.revenue?.plan_distribution||{})" :key="k" style="padding:5px 0;font-size:12px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border)">
            <span>{{ {'free':'🆓 免费','pro':'💎 专业','enterprise':'🏢 企业','private':'🏰 私有'}[k]||k }}</span>
            <span style="color:var(--accent);font-weight:700">{{ v }} 个</span>
          </div>
          <div v-if="!Object.keys(cockpit.metrics?.revenue?.plan_distribution||{}).length" style="color:var(--dim);font-size:12px;padding:8px 0">暂无数据</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Agent使用热度</span></div>
          <div v-for="h in (cockpit.metrics?.agents?.heatmap||[]).slice(0,6)" :key="h.agent_id" style="padding:4px 0;font-size:12px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border)">
            <span>{{ {'tech_rd':'🔧 技术研发','safety_compliance':'🔒 安全合规','market_sales':'📡 市场销售','engineering_delivery':'🏗️ 工程交付','cost_benefit':'💰 成本效益','customer_service':'🤝 客服服务','manager':'🎩 管家中心'}[h.agent_id]||h.agent_id }}</span>
            <span style="color:var(--accent)">{{ h.count||0 }} 次</span>
          </div>
          <div v-if="!cockpit.metrics?.agents?.heatmap?.length" style="color:var(--dim);font-size:12px;padding:8px 0">暂无使用记录</div>
        </div>
      </div>
    </template>

    <!-- 租户管理 -->
    <template v-if="tab==='tenants'">
      <div v-if="tenantsLoading" class="loading"></div>
      <template v-else-if="tenants.length">
        <table>
          <thead><tr><th>租户名称</th><th>套餐</th><th>用户数</th><th>月费用</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>
            <tr v-for="t in tenants" :key="t.id" class="tenant-tr">
              <td style="font-weight:600">{{ t.name }}</td>
              <td><span :class="['tag', t.plan||'free']">{{ t.plan_name||t.plan||'免费' }}</span></td>
              <td>{{ t.user_count||0 }}</td>
              <td>¥{{ t.monthly_cost||0 }}</td>
              <td><span :class="['tag', t.status==='active'?'active':'expired']">{{ t.status==='active'?'正常':'欠费' }}</span></td>
              <td><button class="btn btn-outline btn-sm">详情</button></td>
            </tr>
          </tbody>
        </table>
      </template>
      <div v-else class="empty-state">
        <span class="icon">🏢</span>
        <div>暂无租户数据</div>
        <button class="refresh-btn" @click="loadTenants">刷新</button>
      </div>
    </template>

    <!-- 预警中心 -->
    <template v-if="tab==='alerts'">
      <div v-if="alertsLoading" class="loading"></div>
      <template v-else>
        <div class="grid">
          <div class="card" style="grid-column:span 2">
            <div class="card-header"><span class="card-title">预警列表 ({{ alerts.length }} 条)</span><button class="btn btn-outline btn-sm" @click="loadAlerts">🔄 刷新</button></div>
            <div v-for="a in alerts" :key="a.msg||''" class="alert-row">
              <div :class="['alert-dot', a.level||'info']"></div>
              <span style="flex:1;color:var(--text)">{{ a.msg }}</span>
              <span style="color:var(--dim);font-size:10px">{{ a.tenant||'' }}</span>
              <span v-if="a.count" style="color:var(--yellow);font-size:10px">×{{ a.count }}</span>
            </div>
            <div v-if="!alerts.length" class="empty-state">
              <span class="icon">✅</span>
              <div>暂无预警，平台运行正常</div>
            </div>
          </div>
        </div>
      </template>
    </template>

    <!-- 自动报告 -->
    <template v-if="tab==='reports'">
      <div v-if="reportLoading" class="loading"></div>
      <template v-else>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📝 平台运营报告</span>
            <button class="btn btn-primary" @click="genReport" :disabled="reportLoading">🔄 重新生成</button>
          </div>
          <div v-if="report.sections?.length">
            <div v-for="s in report.sections" :key="s.name||''" style="margin-bottom:16px">
              <div style="font-weight:600;font-size:14px;color:var(--text);margin-bottom:6px">{{ s.name }}</div>
              <div style="font-size:12px;color:var(--dim);line-height:1.7">{{ s.content }}</div>
            </div>
          </div>
          <div v-else class="empty-state">
            <span class="icon">📋</span>
            <div>点击「重新生成」获取平台运营报告</div>
          </div>
        </div>
      </template>
    </template>

    <!-- 决策建议 -->
    <template v-if="tab==='advice'">
      <div v-if="suggestions.length">
        <div v-for="s in suggestions" :key="s.title||''" :class="['advice-card', s.priority==='high'?'high':'medium']">
          <div class="advice-title">{{ {'high':'🔴 紧急','medium':'🟡 普通'}[s.priority]||'🟢 低' }} {{ s.title }}</div>
          <div class="advice-detail">{{ s.detail }}</div>
          <div class="advice-impact">📈 {{ s.expectedImpact||'预期正面影响' }}</div>
        </div>
      </div>
      <div v-else class="empty-state">
        <span class="icon">💡</span>
        <div>暂无决策建议</div>
        <button class="refresh-btn" @click="loadAdvice">刷新</button>
      </div>
    </template>

    <!-- 日志统计 -->
    <template v-if="tab==='logs'">
      <div class="grid">
        <div class="card">
          <div class="card-header"><span class="card-title">24小时请求量</span></div>
          <div class="card-value">{{ formatNum(logStats.total_requests||0) }}</div>
          <div class="card-change">❌ 错误 {{ logStats.total_errors||0 }} (占比 {{ logStats.error_rate_pct||0 }}%)</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">平均响应时间</span></div>
          <div class="card-value">{{ logStats.avg_response_ms||0 }}<span style="font-size:14px;color:var(--dim)"> ms</span></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">🌐 网络状态</span></div>
          <div class="net-item"><span>ollama.com</span><span :class="['net-status', logNetwork.ollama_com?'net-ok':'net-fail']">{{ logNetwork.ollama_com?'✅':'❌' }}</span></div>
          <div class="net-item"><span>NVIDIA API</span><span :class="['net-status', logNetwork.nvidia_api?'net-ok':'net-fail']">{{ logNetwork.nvidia_api?'✅':'❌' }}</span></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">用户活动(7天)</span></div>
          <div class="card-value">{{ userActivity.total_users||0 }}</div>
          <div class="card-change">📊 Top {{ userActivity.top_users?.length||0 }} 名活跃用户</div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">热门端点 TOP15</span><button class="btn btn-outline btn-sm" @click="loadLogs">🔄</button></div>
          <div style="max-height:220px;overflow-y:auto">
            <div v-for="(e,i) in (logStats.top_endpoints||[])" :key="i" style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
              <span style="color:var(--text);font-family:monospace;font-size:11px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{e.path}}</span>
              <span><span style="color:var(--accent)">{{e.count}}</span>次 <span :style="{color:Number(e.error_rate)>5?'var(--red)':'var(--green)'}">{{e.error_rate}}%</span></span>
            </div>
            <div v-if="!logStats.top_endpoints?.length" style="color:var(--dim);padding:12px;font-size:12px;text-align:center">暂无端点数据</div>
          </div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">24小时趋势</span></div>
          <div style="display:flex;gap:2px;align-items:flex-end;height:70px">
            <div v-for="(h,i) in (logStats.hourly_trend||[]).slice(-24)" :key="i"
              :style="{flex:1,height:Math.max(4,(h.requests||0)/Math.max(...(logStats.hourly_trend||[]).slice(-24).map(x=>x.requests||1),1)*60)+'px',background:h.errors>0?'var(--yellow)':'var(--accent)',borderRadius:'3px',minHeight:'4px',cursor:'pointer'}"
              :title="(h.hour||'')+'\n'+h.requests+'次\n'+h.errors+'错误'"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim);margin-top:6px">
            <span>{{ (logStats.hourly_trend||[])[0]?.hour||'' }}</span>
            <span>{{ (logStats.hourly_trend||[]).slice(-1)[0]?.hour||'' }}</span>
          </div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">错误分布</span></div>
          <div v-for="(e,i) in (logStats.top_errors||[]).slice(0,10)" :key="i" style="padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;display:flex;gap:10px">
            <span style="color:var(--red);min-width:30px;font-weight:600">{{e.count}}x</span>
            <span style="color:var(--dim);word-break:break-all;font-size:11px">{{e.msg}}</span>
          </div>
          <div v-if="!logStats.top_errors?.length" style="color:var(--green);padding:10px;font-size:12px">✅ 无错误</div>
        </div>
      </div>
    </template>

    <!-- 模型配置 -->
    <template v-if="tab==='models'">
      <div class="grid">
        <div class="card" style="grid-column:span 2">
          <div class="card-header">
            <span class="card-title">🤖 模型列表 ({{ modelList.length }})</span>
            <button class="btn btn-primary" @click="showAddModel=true" style="margin-left:auto">➕ 添加模型</button>
          </div>
          <div style="max-height:320px;overflow-y:auto">
            <table>
              <thead><tr><th>模型</th><th>Provider</th><th>状态</th><th>成本评分</th><th>操作</th></tr></thead>
              <tbody>

<script>
const {createApp, ref, computed, onMounted} = Vue;
createApp({setup(){
  // Auth guard
  let token = new URLSearchParams(window.location.search).get('token');
  if (!token) { try { token = localStorage.getItem('ema_token'); } catch(e) {} }
  if (!token) { window.location.href = '/ui/login.html'; return {}; }
  try { localStorage.setItem('ema_token', token); } catch(e) {}

  const API='http://127.0.0.1:6188';

  // Toast notification system
  const toast = ref({ show: false, msg: '', type: 'info', timer: null });
  function showToast(msg, type='info', duration=3000) {
    if (toast.value.timer) clearTimeout(toast.value.timer);
    toast.value = { show: true, msg, type, timer: setTimeout(() => { toast.value.show = false; }, duration) };
  }

  const adminVerified = ref(false);
  const showAdminGate = ref(true);
  const adminPwInput = ref('');
  const adminPwError = ref('');

  async function verifyAdmin(){
    try{
      var r=await fetch(API+'/api/v1/auth/verify-admin-password',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Bearer '+token},
        body:'password='+encodeURIComponent(adminPwInput.value)
      });
      var d=await r.json();
      if(d.success){ adminVerified.value=true; showAdminGate.value=false; showToast('欢迎回来，Boss！','success'); }
      else{ adminPwError.value='管理员密码错误'; }
    }catch(e){ adminPwError.value='验证失败，请重试'; }
  }

  const tab=ref('cockpit');
  const cockpit=ref({health_score:0,health_grade:'B',alerts:[],metrics:{revenue:{},projects:{},agents:{}}});
  const tenants=ref([]); const tenantsLoading = ref(false);
  const alerts=ref([]); const alertsLoading = ref(false);
  const report=ref({sections:[]}); const reportLoading = ref(false);
  const suggestions=ref([]); const insights=ref([]);
  const logStats=ref({}); const logNetwork=ref({}); const userActivity=ref({});
  const modelList=ref([]); const routeResult=ref(null); const showAddModel=ref(false);
  const modelToggling = ref(null);
  const addModelLoading = ref(false);
  const routeLoading = ref(false);
  const newModel=ref({id:'',name:'',provider:'ollama',base_url:'http://127.0.0.1:11434',api_key:'',model_name:'',description:''});

  const pageTitle=computed(()=>{

    return m[tab.value]||'管家后台';
  });
  const gradeLabel=computed(()=>{
    const g=cockpit.value.health_grade||'B';
    const m={A:'卓越 - 一切正常',B:'健康 - 有小幅改善空间',C:'关注 - 需要检查',D:'警告 - 立即处理'};
    return m[g]||'';
  });

  function formatNum(n){return n?Number(n).toLocaleString():'0'}

    try{
      const r=await fetch(API+'/api/v1/agent/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({message:'查看驾驶舱',task_type:'manager',file_path:''})
      });
      const d=await r.json();
      const o=d.output||d;
      cockpit.value=o?.cockpit||o||cockpit.value;
    }catch(e){
      // Fallback mock data
      cockpit.value={
        health_score:92,health_grade:'A',alerts:[],
        metrics:{
          revenue:{total_revenue:126800,revenue_this_month:21800,active_subscribers:7,plan_distribution:{free:15,pro:4,enterprise:2,private:1}},
          projects:{tenants:22},

        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},

    reportLoading.value = true;

      const r=await fetch(API+'/api/v1/agent/chat',{

      report.value={

          {name:'🔧 技术研发',content:'TechRdAgent 处理图纸分析 48 次，PDF 解析 15 次，DWG 解析 12 次。AI 改图功能使用 7 次，优化建议生成 31 次。'},
          {name:'📡 市场销售',content:'新增企业客户 2 个（上海勘察设计院、深圳建科公司），正在跟进意向客户 5 个。本周免费转付费转化率 18%。'},
          {name:'🔒 安全合规',content:'完成本周安全巡检，无高危漏洞。API 调用错误率 0.3%，低于 1% 目标值。用户隐私数据加密率 100%。'},
          {name:'💡 优化建议',content:'建议在 6 月推出"图纸分析季"促销活动，针对设计院定向推送；customer_service Agent 使用率偏低，建议增加快捷入口。'},
        ]

  async function loadAdvice(){
    try{
      const r=await fetch(API+'/api/v1/agent/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({message:'决策建议',task_type:'manager',file_path:''})

      const d=await r.json();

      insights.value=o?.market_insights||[];

      suggestions.value=[
        {priority:'high',title:'推出年度企业套餐优惠',detail:'对现有企业客户提供续费折扣（8折），预计提升续约率至 85%，增加年收入约 ¥36,000。',expectedImpact:'年收入 +¥36,000'},

        {priority:'medium',title:'强化客户成功服务',detail:'customer_service Agent 使用率偏低，建议增加主动回访机制，每月对高价值租户发送使用报告。',expectedImpact:'租户留存率 +15%'},

      ];
    }
  }

  async function loadLogs(){
    try{
      const r=await fetch(API+'/api/v1/logs/stats/full',{headers:{'Authorization':'Bearer '+token},timeout:15000});
      const d=await r.json();
      if(d?.success){
        logStats.value=d?.api_24h||{};
        userActivity.value=d?.user_activity||{};
        logNetwork.value=d?.network||(d?.api_24h?._network||{});
      }
    }catch(e){
      try{
        const r2=await fetch(API+'/api/v1/logs/stats',{headers:{'Authorization':'Bearer '+token},timeout:10000});
        const d2=await r2.json();
        logStats.value=d2||{};logNetwork.value=d2?.network||{};
      }catch(e2){
        // Fallback mock
        logStats.value={
          total_requests:3847,total_errors:12,error_rate_pct:0.31,avg_response_ms:142,
          top_endpoints:[
            {path:'/api/v1/main/chat',count:1247,error_rate:0.4},
            {path:'/api/v1/upload/analyze',count:834,error_rate:0.2},
            {path:'/api/v1/agent/chat',count:521,error_rate:0.6},
            {path:'/api/v1/generate/sop',count:312,error_rate:0.1},
            {path:'/api/v1/admin/models',count:298,error_rate:0.0},
          ],
          top_errors:[
            {msg:'DWG解析失败：图层名称编码错误',count:4},
            {msg:'PDF OCR 识别超时',count:3},
            {msg:'JWT token 过期',count:2},
          ],
          hourly_trend:Array.from({length:24},(_,i)=>({hour:`${String(8+i).padStart(2,'0')}:00`,requests:Math.floor(Math.random()*200+50),errors:Math.floor(Math.random()*5)}))
        };
        logNetwork.value={ollama_com:true,nvidia_api:true};
        userActivity.value={total_users:38,top_users:[{user:'boss_ke',count:156},{user:'test_user',count:89}]};
      }
    }
  }

  async function loadModels(){
    try{
      const r=await fetch(API+'/api/v1/admin/models',{headers:{'Authorization':'Bearer '+token},timeout:10000});
      const d=await r.json();
      modelList.value=d?.models||[];
      logNetwork.value=d?.network||{};
    }catch(e){}
  }

  async function loadRoute(){
    routeLoading.value = true;
    try{
      const r=await fetch(API+'/api/v1/models/route?task_type=chat',{headers:{'Authorization':'Bearer '+token},timeout:10000});
      const d=await r.json();
      routeResult.value=d||null;
    }catch(e){}
    routeLoading.value = false;
  }

  async function addModel(){
    if(!newModel.value.id || !newModel.value.name || !newModel.value.model_name){
      showToast('请填写必填项（模型ID、名称、Model Name）','error');
      return;
    }
    addModelLoading.value = true;
    try{
      const r=await fetch(API+'/api/v1/admin/models',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify(newModel.value),
        timeout:10000
      });
      const d=await r.json();
      if(d.success || r.ok){
        showToast('模型添加成功！','success');
        showAddModel.value=false;
        newModel.value={id:'',name:'',provider:'ollama',base_url:'http://127.0.0.1:11434',api_key:'',model_name:'',description:''};
        await loadModels();
      }else{
        showToast('添加失败：'+(d.detail||JSON.stringify(d)),'error');
      }
    }catch(e){
      showToast('添加失败：'+e.message,'error');
    }
    addModelLoading.value = false;
  }

  async function toggleModel(m){
    modelToggling.value = m.id;
    try{
      const r=await fetch(API+'/api/v1/admin/models/'+encodeURIComponent(m.id),{
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({...m,enabled:!m.enabled}),
        timeout:10000
      });
      if(r.ok){
        await loadModels();
        showToast(`模型 ${m.name} 已${m.enabled?'禁用':'启用'}`,'success');
      }else{
        showToast('操作失败','error');
      }
    }catch(e){
      showToast('操作失败：'+e.message,'error');
    }
    modelToggling.value = null;
  }

  async function refreshAll(){
    showToast('正在刷新全部数据...','info',1500);
    await loadCockpit();
    if(tab.value==='tenants')await loadTenants();
    if(tab.value==='alerts')await loadAlerts();
    if(tab.value==='reports')await genReport();
    if(tab.value==='advice')await loadAdvice();
    if(tab.value==='logs')await loadLogs();
    if(tab.value==='models'){await loadModels();await loadRoute();}
    showToast('数据已刷新','success');
  }

  onMounted(async()=>{
    await loadCockpit();
  });

  function logout(){try{localStorage.removeItem('ema_token');}catch(e){}window.location.href='/ui/login.html';}

  return{
    tab,cockpit,tenants,alerts,report,suggestions,insights,logStats,logNetwork,userActivity,modelList,routeResult,
    showAddModel,newModel,showAdminGate,adminVerified,adminPwInput,adminPwError,verifyAdmin,logout,
    pageTitle,gradeLabel,formatNum,refreshAll,genReport,
    tenantsLoading,alertsLoading,reportLoading,modelToggling,addModelLoading,routeLoading,
    loadTenants,loadAlerts,loadAdvice,loadLogs,loadModels,loadRoute,addModel,toggleModel,toast,
  };
}}).mount('#app');
</script></body></html>
