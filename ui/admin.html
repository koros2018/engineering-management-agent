<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMA 管家后台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e14;--card:#141b23;--border:#1e2a3a;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--dim:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px}
.sb-name{font-size:14px;font-weight:600}.sb-role{font-size:10px;color:var(--accent)}
.sb-nav{flex:1;padding:12px 8px}.sb-item{padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:2px;transition:all .15s}
.sb-item:hover{background:var(--border);color:var(--text)}
.sb-item.active{background:var(--accent);color:#fff}
.main{flex:1;overflow-y:auto;padding:24px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h1{font-size:20px}.topbar-badges{display:flex;gap:10px}
.badge{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600}
.badge.boss{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff}
.badge.live{background:var(--green);color:#000}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.card-value{font-size:28px;font-weight:700}
.card-change{font-size:11px;color:var(--green);margin-top:4px}
.card-change.down{color:var(--red)}
.health-ring{width:80px;height:80px;border-radius:50%;border:6px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto}
.health-ring.A{border-color:var(--green);color:var(--green)}
.health-ring.B{border-color:var(--accent);color:var(--accent)}
.health-ring.C{border-color:var(--yellow);color:var(--yellow)}
.alerts{grid-column:span 2}.alert-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:10px;font-size:12px}
.alert-row:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.danger{background:var(--red)}.alert-dot.warning{background:var(--yellow)}.alert-dot.info{background:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--dim);border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
.tag{font-size:10px;padding:2px 6px;border-radius:4px}
.tag.active{background:var(--green);color:#000}.tag.expired{background:var(--red);color:#fff}
.tag.free{background:var(--border);color:var(--dim)}.tag.pro{background:var(--accent);color:#fff}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-weight:600}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--red);color:#fff}
.refresh{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(59,130,246,.5)}
.loading{text-align:center;padding:40px;color:var(--dim)}
@media(max-width:768px){.sidebar{display:none}.grid{grid-template-columns:1fr}.main{padding:14px}}
</style></head>
<body>
<div id="app">
<div class="layout">
  <div class="sidebar">
    <div class="sb-header"><div class="sb-avatar">🎩</div><div><div class="sb-name">Boss</div><div class="sb-role">超级管理员</div></div></div>
    <div class="sb-nav">
      <div @click="tab='cockpit'" :class="['sb-item',{active:tab==='cockpit'}]">📊 驾驶舱</div>
      <div @click="tab='tenants'" :class="['sb-item',{active:tab==='tenants'}]">👥 租户管理</div>
      <div @click="tab='alerts'" :class="['sb-item',{active:tab==='alerts'}]">🚨 预警中心</div>
      <div @click="tab='reports'" :class="['sb-item',{active:tab==='reports'}]">📝 自动报告</div>
      <div @click="tab='advice'" :class="['sb-item',{active:tab==='advice'}]">💡 决策建议</div>
    </div>
  </div>
  <div class="main" v-if="!showAdminGate">
    <div class="topbar">
      <h1>{{pageTitle}}</h1>
      <div class="topbar-badges"><span class="badge boss">🎩 Boss Mode</span><span class="badge live">● 在线</span><span style="font-size:12px;color:var(--dim);cursor:pointer;margin-left:4px" @click="logout" title="登出">🚪 登出</span></div>
    </div>

    <!-- 驾驶舱 -->
    <template v-if="tab==='cockpit'">
      <div class="grid">
        <div class="card">
          <div class="card-header"><span class="card-title">平台健康度</span></div>
          <div :class="['health-ring', cockpit.health_grade||'B']">{{ cockpit.health_score }}%</div>
          <div style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">{{ gradeLabel }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">总收入</span></div>
          <div class="card-value">¥{{ formatNum((cockpit.metrics?.revenue?.total_revenue||0)) }}</div>
          <div class="card-change">本月 ¥{{ formatNum(cockpit.metrics?.revenue?.revenue_this_month||0) }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">总租户</span></div>
          <div class="card-value">{{ cockpit.metrics?.projects?.tenants||0 }}</div>
          <div class="card-change">活跃 {{ cockpit.metrics?.revenue?.active_subscribers||0 }}</div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">安全评分</span></div>
          <div class="card-value">{{ cockpit.metrics?.security?.score||0 }}/100</div>
          <div class="card-change">{{ cockpit.metrics?.security?.grade||'B' }} 级</div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">🚨 活跃预警</span></div>
          <div v-if="cockpit.alerts?.length">{{ cockpit.alerts.length }} 条</div>
          <div v-for="a in cockpit.alerts?.slice(0,8)" :key="a.msg" class="alert-row">
            <div :class="['alert-dot', a.level]"></div>
            <span>{{ a.msg }}</span>
          </div>
          <div v-if="!cockpit.alerts?.length" style="color:var(--green);font-size:12px">✅ 一切正常</div>
        </div>
        <div class="card"><div class="card-header"><span class="card-title">快速操作</span></div>
          <div v-for="a in cockpit.quick_actions||[]" :key="a.id" style="padding:8px 0;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)" @click="quickAction(a)">{{ a.label }}<div style="font-size:10px;color:var(--dim)">{{ a.desc }}</div></div>
        </div>
        <div class="card"><div class="card-header"><span class="card-title">套餐分布</span></div>
          <div v-for="(v,k) in (cockpit.metrics?.revenue?.plan_distribution||{})" :key="k" style="padding:4px 0;font-size:12px;display:flex;justify-content:space-between">
            <span>{{ {'free':'🆓体验','pro':'💎专业','enterprise':'🏢企业','private':'🏰私有'}[k]||k }}</span><span>{{ v }} 个</span>
          </div>
        </div>
        <div class="card"><div class="card-header"><span class="card-title">Agent使用热度</span></div>
          <div v-for="h in (cockpit.metrics?.agents?.heatmap||[]).slice(0,6)" :key="h.agent_id" style="padding:4px 0;font-size:12px;display:flex;justify-content:space-between">
            <span>{{ {'tech_rd':'🔧技术','safety_compliance':'🔒安全','market_sales':'📡市场','engineering_delivery':'🏗️交付','cost_benefit':'💰成本','customer_service':'🤝客服','manager':'🎩管家'}[h.agent_id]||h.agent_id }}</span><span>{{ h.count }} 次</span>
          </div>
        </div>
      </div>
    </template>

    <!-- 租户管理 -->
    <template v-if="tab==='tenants'">
      <table><thead><tr><th>租户名称</th><th>套餐</th><th>用户数</th><th>状态</th><th>操作</th></tr></thead>
        <tbody><tr v-for="t in tenants" :key="t.id"><td>{{ t.name }}</td><td><span :class="['tag', t.plan]">{{ t.plan_name }}</span></td><td>{{ t.user_count }}</td><td><span :class="['tag', t.status]">{{ t.status }}</span></td><td><button class="btn btn-primary">查看</button></td></tr></tbody>
      </table>
      <div v-if="!tenants.length" class="loading">暂无租户</div>
    </template>

    <!-- 预警中心 -->
    <template v-if="tab==='alerts'">
      <div class="grid">
        <div class="card" style="grid-column:span 2">
          <div class="card-header"><span class="card-title">预警列表（{{ alerts.length }} 条）</span></div>
          <div v-for="a in alerts" :key="a.msg" class="alert-row"><div :class="['alert-dot', a.level]"></div><span style="flex:1">{{ a.msg }}</span><span style="color:var(--dim);font-size:10px">{{ a.tenant }}</span></div>
        </div>
      </div>
    </template>

    <!-- 自动报告 -->
    <template v-if="tab==='reports'">
      <div class="card"><div class="card-title">📝 平台运营报告</div>
        <div style="padding:8px 0" v-for="s in report.sections||[]" :key="s.name">
          <div style="font-weight:600;font-size:13px;margin-bottom:4px">{{ s.name }}</div>
          <div style="font-size:12px;color:var(--dim)">{{ s.content }}</div>
        </div>
        <div style="margin-top:8px"><button class="btn btn-primary" @click="genReport">🔄 重新生成</button></div>
      </div>
    </template>

    <!-- 决策建议 -->
    <template v-if="tab==='advice'">
      <div class="card" v-for="s in suggestions" :key="s.title" style="margin-bottom:12px">
        <div style="font-weight:600;margin-bottom:8px">{{ {'high':'🔴','medium':'🟡'}[s.priority] }} {{ s.title }}</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:6px">{{ s.detail }}</div>
        <div style="font-size:11px;color:var(--green)">📈 {{ s.expectedImpact }}</div>
      </div>
      <div class="card"><div class="card-title">🌍 市场洞察</div><div v-for="i in insights" :key="i" style="padding:6px 0;font-size:12px;color:var(--dim)">• {{ i }}</div></div>
    </template>

    <button class="refresh" @click="refreshAll" title="刷新全部">🔄</button>
  </div>

  <!-- 管理后台密码弹窗 -->
  <div v-if="showAdminGate" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center">
    <div style="background:#141b23;border:1px solid #1e2a3a;border-radius:16px;padding:36px 32px;width:380px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">👑</div>
      <div style="font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:4px">Boss 管理后台</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:20px">请输入管理后台密码以继续</div>
      <input v-model="adminPwInput" type="password" placeholder="后台密码" style="width:100%;padding:12px;background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;font-size:14px;color:#e2e8f0;outline:none;margin-bottom:12px" @keydown.enter="verifyAdmin">
      <div v-if="adminPwError" style="font-size:12px;color:#ef4444;margin-bottom:8px">{{adminPwError}}</div>
      <button @click="verifyAdmin" style="width:100%;padding:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">🔓 验证进入</button>
    </div>
  </div>
</div>
</div>
<script>
const {createApp, ref, computed, onMounted} = Vue;
createApp({setup(){
  // Auth guard
  let token = new URLSearchParams(window.location.search).get('token');
  if (!token) { try { token = localStorage.getItem('ema_token'); } catch(e) {} }
  if (!token) { window.location.href = '/ui/login.html'; return {}; }
  try { localStorage.setItem('ema_token', token); } catch(e) {}

  const API=window.location.protocol==='https:'?'':'http://127.0.0.1:6188';
  const adminVerified = ref(false);
  const showAdminGate = ref(true);
  const adminPwInput = ref('');
  const adminPwError = ref('');

  async function verifyAdmin(){
    try{
      var r=await fetch(API+'/api/v1/auth/verify-admin-password',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Bearer '+token},
        body:'password='+encodeURIComponent(adminPwInput.value)
      });
      var d=await r.json();
      if(d.success){ adminVerified.value=true; showAdminGate.value=false; }
      else{ adminPwError.value='管理员密码错误'; }
    }catch(e){ adminPwError.value='验证失败'; }
  }
  const tab=ref('cockpit');
  const cockpit=ref({health_score:0,health_grade:'B',alerts:[],metrics:{revenue:{},projects:{},agents:{heatmap:[]},security:{}},quick_actions:[]});
  const tenants=ref([]);const alerts=ref([]);const report=ref({sections:[]});const suggestions=ref([]);const insights=ref([]);

  const pageTitle=computed(()=>{
    const m={'cockpit':'📊 运营驾驶舱','tenants':'👥 租户管理','alerts':'🚨 预警中心','reports':'📝 自动报告','advice':'💡 决策建议'};
    return m[tab.value]||'管家后台';
  });
  const gradeLabel=computed(()=>{
    const g=cockpit.value.health_grade||'B';const m={A:'卓越 - 一切正常',B:'健康 - 有小幅改善空间',C:'关注 - 需要检查',D:'警告 - 立即处理'};
    return m[g]||'';
  });

  function formatNum(n){return n?n.toLocaleString():'0'}

  async function loadCockpit(){
    try{const r=await fetch(API+'/api/v1/agent/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'查看驾驶舱',task_type:'manager',file_path:''})});const d=await r.json();const o=d.output||d;cockpit.value=o?.cockpit||o||cockpit.value;}catch(e){}
  }
  async function loadTenants(){
    try{const r=await fetch(API+'/api/v1/agent/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'管理租户',task_type:'manager',file_path:''})});const d=await r.json();const o=d.output||d;tenants.value=o?.tenants||[];}catch(e){}
  }
  async function loadAlerts(){
    try{const r=await fetch(API+'/api/v1/agent/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'检查预警',task_type:'manager',file_path:''})});const d=await r.json();const o=d.output||d;const ac=o?.alert_center||{};alerts.value=ac.alerts||[];}catch(e){}
  }
  async function genReport(){
    try{const r=await fetch(API+'/api/v1/agent/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'生成周报',task_type:'manager',file_path:''})});const d=await r.json();const o=d.output||d;report.value=o?.report||{sections:[]};}catch(e){}
  }
  async function loadAdvice(){
    try{const r=await fetch(API+'/api/v1/agent/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'决策建议',task_type:'manager',file_path:''})});const d=await r.json();const o=d.output||d;suggestions.value=o?.suggestions||[];insights.value=o?.market_insights||[];}catch(e){}
  }

  async function refreshAll(){await loadCockpit();if(tab.value==='tenants')await loadTenants();if(tab.value==='alerts')await loadAlerts();if(tab.value==='reports')await genReport();if(tab.value==='advice')await loadAdvice();}

  function quickAction(a){
    if(a.id==='view_tenants'){tab.value='tenants';loadTenants();}
    else if(a.id==='run_security'){tab.value='alerts';loadAlerts();}
    else if(a.id==='generate_report'){tab.value='reports';genReport();}
  }

  onMounted(async()=>{await loadCockpit();loadTenants();loadAlerts();loadAdvice();});
  function logout(){try{localStorage.removeItem('ema_token');}catch(e){}window.location.href='/ui/login.html';}
  return{tab,cockpit,tenants,alerts,report,suggestions,insights,pageTitle,gradeLabel,formatNum,refreshAll,quickAction,genReport,
    adminVerified,showAdminGate,adminPwInput,adminPwError,verifyAdmin,logout};
}}).mount('#app');
</script></body></html>
