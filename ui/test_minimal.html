<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head><body>
<div id="app">{{ msg }}</div>
<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const msg = ref('Hello Vue!');
    return { msg };
  }
}).mount('#app');
</script>
</body></html>
