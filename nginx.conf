# ── EMA Nginx 配置 ────────────────────────────────────────────
# 生产环境反向代理：API + 静态UI + SSL + Gzip + 缓存
#
# SSL 证书:
#   开发/测试: 自签名证书 (docker/certs/selfsigned.*)
#   生产:     Let's Encrypt 或商业证书 (替换为实际路径)
#
# 环境变量:
#   EMA_SSL_ENABLED=true     启用 SSL
#   EMA_SSL_CERT_PATH=       证书路径 (PEM fullchain)
#   EMA_SSL_KEY_PATH=        私钥路径 (PEM privkey)
#   EMA_SERVER_NAME=         域名 (默认: localhost)
# ──────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上游API
    upstream ema_api {
        server ema-api:6188;
        keepalive 32;
    }

    # ── HTTP → HTTPS 重定向 ──
    server {
        listen 80;
        server_name ${EMA_SERVER_NAME};

        # ACME 挑战路径（Let's Encrypt 证书续期用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS 主服务 ──
    server {
        listen 443 ssl http2;
        server_name ${EMA_SERVER_NAME};

        # SSL 证书
        ssl_certificate     ${EMA_SSL_CERT_PATH};
        ssl_certificate_key ${EMA_SSL_KEY_PATH};

        # SSL 协议与加密套件（现代安全标准）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL 会话缓存
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # HSTS (生产环境启用，max-age 至少 6 个月)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── API代理 ──
        location /api/ {
            proxy_pass http://ema_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── WebSocket 支持（未来扩展） ──
        location /ws/ {
            proxy_pass http://ema_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ── SSE 流式接口（特殊超时设置） ──
        location /api/v1/agent/chat/stream {
            proxy_pass http://ema_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
        }

        # ── upload/chat SSE 流式 ──
        location /api/v1/upload/chat {
            proxy_pass http://ema_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
            client_max_body_size 50M;
        }

        # ── Health检查 ──
        location /health {
            proxy_pass http://ema_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Swagger文档 ──
        location /docs {
            proxy_pass http://ema_api/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://ema_api/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── 静态UI文件 ──
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML不缓存
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }

            # 静态资源缓存7天
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
