name: EMA CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  PYTHON_VERSION: "3.12"
  EMA_LOG_LEVEL: "WARNING"

jobs:
  # ── 单元测试 + Lint ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing
        continue-on-error: false

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Docker 构建 ──────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ema-api
          tags: |
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build Docker image
        run: |
          docker build -t ema-api:${{ github.sha }} -t ema-api:latest -f Dockerfile .
          echo "✅ Docker image built: ema-api:${{ github.sha }}"

      - name: Smoketest health check
        run: |
          docker run -d --name ema-test -p 5188:5188 ema-api:${{ github.sha }}
          sleep 10
          curl -f http://127.0.0.1:5188/health || (docker logs ema-test && exit 1)
          docker stop ema-test && docker rm ema-test
